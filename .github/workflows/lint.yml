name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: sudo apt-get update && sudo apt-get install -y shfmt shellcheck
      - run: ./scripts/lint.sh
