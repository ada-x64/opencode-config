name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name for the release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write
  id-token: write # required for PyPI trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi # configure trusted publishing in PyPI project settings

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tools
        run: pip install hatchling build

      - name: Stamp version from tag
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          VERSION="${TAG#v}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" scripts/pyproject.toml

      - name: Build wheel + sdist
        run: python -m build scripts/

      - name: Build tarball
        run: |
          tar -czf opencode-config.tar.gz \
            --exclude='src/profiles/' \
            src/ \
            scripts/ \
            AGENTS.md

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            scripts/setup.py
            opencode-config.tar.gz
