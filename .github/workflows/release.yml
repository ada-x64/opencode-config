name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name for the release (e.g. v1.0.0)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.tag }}" ]]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build tarball
        run: |
          tar -czf opencode-config.tar.gz \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='setup.sh' \
            --exclude='docker/Dockerfile' \
            --exclude='docker/.dockerignore' \
            --exclude='README.md' \
            --exclude='.gitignore' \
            --exclude='sandbox/' \
            --exclude='node_modules/' \
            agents/ \
            skills/ \
            prompts/ \
            images/ \
            docker/aoe-config.toml \
            opencode.json \
            build.yaml \
            build.sh \
            install.sh \
            profiles/ \
            AGENTS.md \
            package.json \
            bun.lock

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            setup.sh
            opencode-config.tar.gz
