bash:
  # GitHub CLI (read-only + issue/project write)
  "gh issue create*": ask
  "gh issue edit*": ask
  "gh project item-add*": ask
  "gh pr comment*": ask
  # Filesystem write
  "cp *": allow
  "ln *": allow
  "mktemp*": allow
  "rmdir *": allow
  "chmod *": allow
  "touch *": allow
  "install *": allow
