bash:
{{#if MODE=manual}}
  # GitHub CLI — user-approved; lifecycle tools return commands, agent runs them
  "gh issue edit*": ask
  "gh issue comment*": ask
  "gh pr comment*": ask
{{/if}}
{{#if MODE=autonomous}}
  # GitHub CLI — PR cross-reference comments only (issue mutations are deferred)
  "gh pr comment*": allow
{{/if}}
  # Vault write (filesystem)
  "mv *": allow
  "rm *": allow
  "mkdir *": allow
  # Git (write — staging, branch switching, and worktree management)
  "git add*": allow
  "git switch*": allow
  "git checkout*": allow
{{#if MODE=autonomous}}
  "git commit*": allow
  "git stash*": allow
{{/if}}
  "git worktree add*": allow
  "git worktree remove*": allow
  # Build tools (needed to run validation steps)
  # make — kept as wildcard; targets are project-specific
  "make*": allow
  # cargo — no publish/yank/login/owner/credential
  "cargo build*": allow
  "cargo test*": allow
  "cargo clippy*": allow
  "cargo run*": allow
  "cargo check*": allow
  "cargo fmt*": allow
  "cargo doc*": allow
  "cargo bench*": allow
  "cargo clean*": allow
  "cargo fix*": allow
  "cargo add*": allow
  "cargo remove*": allow
  "cargo update*": allow
  "cargo tree*": allow
  "cargo metadata*": allow
  "cargo generate-lockfile*": allow
  "cargo nextest*": allow
  "cargo llvm-cov*": allow
  # python / uv
  "uv *": allow
  "python*": allow
  # pip — no uninstall/download
  "pip install*": allow
  "pip list*": allow
  "pip show*": allow
  "pip freeze*": allow
  "pip check*": allow
  # npm — no publish/unpublish/deprecate/access
  "npm install*": allow
  "npm ci*": allow
  "npm run*": allow
  "npm run-script*": allow
  "npm test*": allow
  "npm audit*": allow
  "npm ls*": allow
  "npm list*": allow
  "npm outdated*": allow
  "npm update*": allow
  "npm dedupe*": allow
  # npx — kept as wildcard (by design runs arbitrary packages)
  "npx*": allow
  # pnpm
  "pnpm install*": allow
  "pnpm run*": allow
  "pnpm test*": allow
  "pnpm audit*": allow
  "pnpm dlx *": allow
  "pnpm exec *": allow
  # yarn
  "yarn install*": allow
  "yarn run*": allow
  "yarn test*": allow
  "yarn build*": allow
  "yarn add*": allow
  "yarn remove*": allow
  "yarn audit*": allow
  # bun — no publish
  "bun install*": allow
  "bun run*": allow
  "bun test*": allow
  "bun build*": allow
  "bun add*": allow
  "bun remove*": allow
  "bun x*": allow
  # go
  "go *": allow
  # test runners
  "pytest*": allow
  "jest*": allow
  "vitest*": allow
  "tsc*": allow
