# AoE (Agent of Empires) global configuration template
#
# This file is deployed to ~/.config/agent-of-empires/config.toml by
# install.ts. It contains shared sandbox settings (image, resources,
# generic mount paths). Profile-specific settings (secrets, gitconfig,
# mount_ssh) are in per-profile configs deployed from src/aoe-profile.toml.
#
# Path placeholders resolved at install time:
#   {{AGENT_VAULT}}, {{SANDBOX_CONFIG_DIR}}, {{OPENCODE_DATA_DIR}}

[session]
default_tool = "opencode"

[sandbox]
enabled_by_default = true
default_image = "cubething-occonf-sandbox:latest"
auto_cleanup = false
cpu_limit = "4"
memory_limit = "8g"
mount_ssh = false

extra_volumes = [
    "{{AGENT_VAULT}}:/data/vault",
    "{{SANDBOX_CONFIG_DIR}}:/data/config",
    "{{OPENCODE_DATA_DIR}}:/data/opencode-data",
    "/var/run/docker.sock:/var/run/docker.sock",
]
