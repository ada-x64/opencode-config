# AoE (Agent of Empires) configuration template
#
# This file is a versioned template with placeholders. install.py resolves
# {{AGENT_VAULT}}, {{OPENCODE_CONFIG_SRC}}, and {{SANDBOX_CONFIG_DIR}} and
# deploys the result to ~/.config/agent-of-empires/config.toml.
#
# Requires on host:
#   export GH_TOKEN=$(gh auth token 2>/dev/null)
#   export NTFY_TOPIC="<your-ntfy-topic>"

[session]
default_tool = "opencode"

[sandbox]
enabled_by_default = true
default_image = "cubething-occonf-sandbox:latest"
auto_cleanup = false
cpu_limit = "4"
memory_limit = "8g"
mount_ssh = false

extra_volumes = [
    "{{AGENT_VAULT}}:/root/obsidian/agent.obs",
    "{{SANDBOX_CONFIG_DIR}}:/root/.config/opencode",
]

environment = [
    "AGENT_VAULT=/root/obsidian/agent.obs",
    "AGENT_REPOS=/workspace",
    "OPENCODE_CONFIG_SRC=/root/.config/opencode",
    "GH_TOKEN",
    "NTFY_TOPIC",
    "GIT_CONFIG_COUNT=2",
    "GIT_CONFIG_KEY_0=credential.https://github.com.helper",
    "GIT_CONFIG_VALUE_0=!gh auth git-credential",
    "GIT_CONFIG_KEY_1=protocol.version",
    "GIT_CONFIG_VALUE_1=2",
]
