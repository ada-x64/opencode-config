# Build configuration — single source of truth for model + path assignment
# Run `./build.sh` after editing to apply changes

global:
  model: github-copilot/claude-opus-4.6

  # Stamped into every agent's permission.external_directory block.
  # All entries get ": allow". Order is preserved.
  external_directory:
    - "{env:AGENT_REPOS}/**"
    - "{env:AGENT_VAULT}/**"
    - "{env:OPENCODE_CONFIG_SRC}/**"
    - "/tmp/**"

tiers:
  design:
    # null = inherit global model (no model override in agent frontmatter)
    model: null

  execute:
    # TODO: This needs to be stamped in.
    model: github-copilot/claude-sonnet-4.6
